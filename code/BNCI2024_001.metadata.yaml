abstract: 'This study explores the classification of ten letters (a,d,e,f,j,n,o,s,t,v) from non-invasive neural signals of
  20 participants. Letters were classified with direct classification from low-frequency and broadband EEG, and a two-step
  approach comprising continuous decoding of hand kinematics followed by classification. The two-step approach yielded significantly
  higher performances of 26.2% for ten letters and 46.7% for five letters. Hand kinematics could be reconstructed with correlation
  of 0.10 to 0.57 (average chance level: 0.04). Results suggest movement speed as the most informative kinematic for decoding
  short hand movements.'
