methodology: 'Participants wrote 10 letters using right index finger with motion capture tracking (30 Hz, 2D positions). Two-round
  session with 7 runs (round 1) and 8 runs (round 2), 40 trials per run, 8.5s per trial. Training phase included 4 steps:
  observation, guided following, unguided following, and execution without feedback. Classification using sliding-window approach
  with sLDA and EEGNet CNN. Trajectory decoding using EEGNet architecture adapted for regression of position-based (px, py,
  vx, vy), distance-based (d, ḋ, θ, θ̇), and speed-based (s) kinematics.'
